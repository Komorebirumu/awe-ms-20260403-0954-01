<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradientA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E91E63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Gradient -->
  <rect width="100%" height="100%" fill="url(#gradientA)" />

  <!-- Main Title Area -->
  <text x="50%" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" letter-spacing="2">
    AI Niche Game Asset Texturizer
  </text>

  <!-- Central Illustration -->
  <g transform="translate(400, 300) scale(0.8)">

    <!-- AI Brain/Node Symbol -->
    <circle cx="0" cy="0" r="80" fill="#ffffff" opacity="0.9" />
    <g fill="#3F51B5">
      <circle cx="-40" cy="-40" r="20" />
      <circle cx="40" cy="-40" r="20" />
      <circle cx="-40" cy="40" r="20" />
      <circle cx="40" cy="40" r="20" />
      <circle cx="0" cy="0" r="20" />
    </g>
    <line x1="-25" y1="-25" x2="25" y2="25" stroke="#ffffff" stroke-width="5" transform="rotate(45 0 0)" />
    <line x1="-25" y1="25" x2="25" y2="-25" stroke="#ffffff" stroke-width="5" transform="rotate(-45 0 0)" />

    <!-- Connecting Lines -->
    <line x1="0" y1="0" x2="60" y2="60" stroke="#ffffff" stroke-width="3" opacity="0.7" />
    <line x1="0" y1="0" x2="-60" y2="60" stroke="#ffffff" stroke-width="3" opacity="0.7" />
    <line x1="0" y1="0" x2="60" y2="-60" stroke="#ffffff" stroke-width="3" opacity="0.7" />
    <line x1="0" y1="0" x2="-60" y2="-60" stroke="#ffffff" stroke-width="3" opacity="0.7" />

    <!-- Asset Icon -->
    <g transform="translate(150, 0)">
      <rect x="-30" y="-40" width="60" height="80" rx="10" fill="#FF9800" opacity="0.9" />
      <circle cx="0" cy="-60" r="20" fill="#F44336" />
      <path d="M -25 -30 L -25 40 L 25 40 L 25 -30 Z" fill="#FFEB3B" />
    </g>

    <!-- Texturizer Icon -->
    <g transform="translate(-150, 0)">
      <path d="M -40 -50 L 40 -50 L 40 50 L 0 50 L -40 0 Z" fill="#9C27B0" opacity="0.9" />
      <rect x="-15" y="15" width="30" height="20" fill="#E0E0E0" />
      <circle cx="0" cy="-35" r="15" fill="#2196F3" />
    </g>

    <!-- Arrow indicating AI processing -->
    <polygon points="0,-120 20,-100 -20,-100" fill="#ffffff" opacity="0.8" />
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath>
        <animate attributeName="d" from="M0,-120 20,-100 -20,-100" to="M0,-100 20,-80 -20,-80" fill="freeze" dur="2s" />
      </mpath>
    </animateMotion>
  </g>

  <!-- Feature Icons -->
  <g transform="translate(100, 450)">
    <circle cx="0" cy="0" r="30" fill="#FFEB3B" opacity="0.8" />
    <path d="M0 0 L15 25 L0 30 L-15 25 Z" fill="#F44336" />
    <text x="50" y="10" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">Unique Styles</text>
  </g>

  <g transform="translate(350, 450)">
    <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#03A9F4" opacity="0.8" />
    <g fill="#ffffff">
      <rect x="-10" y="-10" width="20" height="20" />
      <rect x="-10" y="10" width="20" height="20" />
      <rect x="10" y="-10" width="20" height="20" />
    </g>
    <text x="50" y="10" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">Voxel <tspan fill="#8BC34A">+ </tspan> PBR</text>
  </g>

  <g transform="translate(600, 450)">
    <polygon points="0,-30 30,0 0,30 -30,0" fill="#8BC34A" opacity="0.8" />
    <path d="M0 0 L5 10 L0 15 L-5 10 Z" fill="#ffffff" />
    <text x="50" y="10" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">Fast Generation</text>
  </g>

</svg>